version: '3.9'

services:
  users-svc-s22:
    image: nginx:alpine
    ports:
      - "8240:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app-net

  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - users-svc-s22
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
