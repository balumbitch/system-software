apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoices-app
  labels:
    app: invoices-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invoices-app
  template:
    metadata:
      labels:
        app: invoices-app
    spec:
      containers:
        - name: invoices-container
          image: nginx:alpine
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
