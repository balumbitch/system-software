name: ci

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      WEEK: "01"
      GROUP: "332"
      STUDENT_ID: "s22"
      IMAGE_NAME: "items-s22"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Запуск тестов
        run: make test WEEK=${{ env.WEEK }}
      - name: Сборка Docker-образа
        run: |
          docker build -t $IMAGE_NAME -f weeks/week-10/Dockerfile weeks/week-10
      - name: Подготовка артефактов
        run: |
          mkdir -p artifacts
          cp weeks/week-10/report.md artifacts/ || true
          cp weeks/week-15/analysis.md artifacts/ || true
      - name: Публикация артефактов
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts
